name: Campus Connect CI/CD

on:
  push:
    branches: [ main ]

jobs:

  test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm test

  deploy:

    needs: test
    runs-on: ubuntu-latest

    steps:

      - name: Deploy notification
        run: echo "Deployment would trigger here"