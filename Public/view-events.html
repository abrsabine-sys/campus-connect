<!DOCTYPE html>
<html>
<head>
  <title>Event Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h1>Event Dashboard</h1>

  <button onclick="logout()">Logout</button>

  <hr>

  <h2>Create Event</h2>
  <input id="title" placeholder="Event Title">
  <input type="date" id="date">
  <input id="creator" placeholder="Organizer Name">
  <button onclick="createNewEvent()">Create Event</button>

  <hr>

  <h2>Filter Events</h2>
  <input type="date" id="filterDate">
  <button onclick="filterEvents()">Filter</button>
  <button onclick="showEvents()">Reset</button>

  <hr>

  <h2>All Events</h2>
  <div id="events"></div>

  <script src="script.js"></script>
</body>
</html>
