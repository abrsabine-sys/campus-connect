<!DOCTYPE html>
<html>
<head>
  <title>RSVP</title>
</head>
<body>
  <!-- Page title -->
  <h1>RSVP to Event</h1>

  <!-- Input for user name -->
  <input id="username" placeholder="Enter your name" />

  <!-- Button to RSVP -->
  <button onclick="rsvp()">RSVP</button>

  <br><br>

  <!-- Button to go back -->
  <button onclick="goBack()">Back to Events</button>

  <script>
    // Get event ID from URL (?id=123)
    const params = new URLSearchParams(window.location.search);
    const eventId = params.get("id");

    // Send RSVP request to backend
    function rsvp() {
      const username = document.getElementById("username").value;

      fetch("http://localhost:5000/events/rsvp", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          eventId: Number(eventId),
          username: username
        })
      })
      .then(res => res.json())
      .then(() => {
        alert("RSVP successful!");
      });
    }

    // Go back to events page
    function goBack() {
      window.location.href = "view-events.html";
    }
  </script>
</body>
</html>
