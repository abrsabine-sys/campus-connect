<!DOCTYPE html>
<html>
<head>
  <title>Create Event</title>
</head>
<body>
  <!-- Page title -->
  <h1>Create Event</h1>

  <!-- Input fields for event info -->
  <input id="title" placeholder="Event Title"><br><br>
  <input id="date" type="date"><br><br>
  <input id="creator" placeholder="Your Name"><br><br>

  <!-- Submit button -->
  <button onclick="createEvent()">Submit</button>

  <br><br>

  <!-- Back button -->
  <button onclick="goBack()">Back to Events</button>

  <script>
    // Send event data to backend
    function createEvent() {
      const title = document.getElementById("title").value;
      const date = document.getElementById("date").value;
      const creator = document.getElementById("creator").value;

      fetch("http://localhost:5000/events/create", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          title: title,
          date: date,
          creator: creator
        })
      })
      .then(res => res.json())
      .then(() => {
        // After creating event, go back to events page
        window.location.href = "view-events.html";
      });
    }

    // Navigate back to events page
    function goBack() {
      window.location.href = "view-events.html";
    }
  </script>
</body>
</html>
